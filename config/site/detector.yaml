# SITE SNAPSHOT — HIME-H-REAP 拠点の実運用 detector.yaml（本番値）
# /etc/presence-logger/detector.yaml の復元元。config/site/README.md を参照。
#
# 注意: 実Piは現在 debounce を検証用に 0.1/0.2 秒へ短縮した状態で稼働中。
# 本番想定値は下記の 3.0/3.0 秒（短すぎるとチャタリングで ENTER/EXIT 乱発）。
camera:
  device: "/dev/video0"
  width: 640
  height: 480
  warmup_frames: 5

inference:
  model_path: "/opt/models/efficientdet_lite0.tflite"
  target_fps: 1.5
  score_threshold: 0.5
  category: "person"

debounce:
  enter_seconds: 3.0
  exit_seconds: 3.0

mqtt:
  host: "mosquitto"
  port: 1883
  qos: 2
  topic_event: "presence/event"
  topic_ack: "presence/event/ack"
  client_id_prefix: "presence-detector"

retry:
  initial_delay_seconds: 5
  max_delay_seconds: 600
  multiplier: 3

buffer:
  path: "/var/lib/presence-logger/detector_buf.db"
  max_rows: 100000
