# SITE SNAPSHOT — taden-ot-ap 拠点の実運用 profiles.yaml（本番値）
# /etc/presence-logger/profiles.yaml の復元元。秘密は ${VAR} 参照のみ
# （実値は secrets.env）。詳細は config/site/README.md を参照。
profiles:
  taden-ot-ap:
    description: "Factory internal Wi-Fi -> HHS001 via JDBC sidecar"
    wifi:
      psk: "${WIFI_PSK_TADEN}"
      hidden: false
      static_ipv4:
        address: "172.29.1.4/24"
        gateway: "172.29.1.254"
        dns: ["192.168.250.1"]
    sntp:
      servers: ["192.168.250.1"]
    oracle:
      client_mode: "jdbc"
      auth_mode: "basic"
      host: "10.168.252.16"
      port: 1521
      service_name: "HHS001"
      user: "ZHH001"
      password: "${ORACLE_PASSWORD_ONPREM}"
      table_name: "HF1RCM01"
      upcmpflg: 1

# CHANGED from "hold" to "drop": events received while not on a known SSID
# are discarded at receive time. The bridge no longer stores them in inbox,
# so a future taden-ot-ap visit does not flush "off-site" captures.
unknown_ssid_policy: "drop"
